server:
  port: 8080

spring:
  application:
    name: ro-ro-monitor
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/ro_ro_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大 10MB
      max-request-size: 10MB     # 整个请求最大 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  config: classpath:logback-spring.xml
  level:
    com.company.roro.mapper: WARN

management:
  endpoints:
    web:
      exposure:
        include: "*"

monitor:
  overall-warn-ratio: 0.8
  snapshot:
    cron: "0 */30 * * * ?"  # 每半小时采集一次快照，默认cron表达式，可自定义

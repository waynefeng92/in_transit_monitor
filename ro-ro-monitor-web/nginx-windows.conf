worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow large file uploads (Excel files up to 20MB)
    client_max_body_size 20M;

    # Logs relative to nginx installation directory
    access_log logs/access.log;
    error_log logs/error.log;

    server {
        listen 80;
        server_name _;

        root D:/in_transit_monitor/frontend;
        index index.html;

        # Frontend static files — SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to backend (local Spring Boot on port 8080)
        location /api/ {
            proxy_pass http://localhost:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Actuator proxy for health checks
        location /actuator/ {
            proxy_pass http://localhost:8080/actuator/;
            proxy_set_header Host $host;
        }
    }
}

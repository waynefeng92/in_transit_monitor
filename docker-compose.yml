version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: roro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-ro_ro_monitor}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ro-ro-monitor/src/main/resources/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - roro-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-3306}:3306"

  backend:
    image: roro-backend:${BACKEND_TAG:-latest}
    build:
      context: ./ro-ro-monitor
      dockerfile: Dockerfile
    container_name: roro-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-ro_ro_monitor}
      - DB_USERNAME=roro_app
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-admin123}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
      - SERVER_PORT=8080
      - TZ=Asia/Shanghai
    volumes:
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    ports:
      - "18080:8080"
    networks:
      - roro-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    image: roro-frontend:${FRONTEND_TAG:-latest}
    build:
      context: ./ro-ro-monitor-web
      dockerfile: Dockerfile
    container_name: roro-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - roro-net
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai

volumes:
  mysql-data:
  backend-logs:
  backend-uploads:

networks:
  roro-net:
    driver: bridge
